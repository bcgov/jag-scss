name: Build & Push SCSS API to Artifactory
permissions:
  contents: write
on:
  push:
    branches: 'develop'
    paths:
      - "src/**"
      - ".github/workflows/dev-build-and-push-scss.yaml"
  workflow_dispatch:

env:
  IMAGE_NAME: jag-scss
  WORKING_DIRECTORY: ./src
  IMAGE_TAG: dev
  BRANCH_NAME: develop
  ARTIFACTORY_URL: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Login to Artifactory
        uses: docker/login-action@v1
        with:
          registry: artifacts.developer.gov.bc.ca
          username: ${{ secrets.ARTIFACTORY_USERNAME }}
          password: ${{ secrets.ARTIFACTORY_PASSWORD }}

      # Get SHORT_SHA to tag images
      - name: Get short SHA
        id: short_sha
        run: |
          echo "::set-output name=SHORT_SHA::$(git rev-parse --short HEAD)"
          echo "Short SHA: $SHORT_SHA"

      - name: Docker Build SCSS Image
        working-directory: ${{env.WORKING_DIRECTORY}}
        run: |
          docker build . -t ${{ env.IMAGE_NAME }}
          docker tag ${{ env.IMAGE_NAME }} artifacts.developer.gov.bc.ca/${{ env.ARTIFACTORY_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
  
      - name: Docker Push to Artifactory
        id: publish
        run: |
          docker push artifacts.developer.gov.bc.ca/${{ env.ARTIFACTORY_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          
        #   Run Vulnerability Scan usinig Trivy scanner
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: artifacts.developer.gov.bc.ca/${{ env.ARTIFACTORY_URL }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: 'table'
          ignore-unfixed: true
          limit-severities-for-sarif: true
          severity: HIGH,CRITICAL
      
      - name: Set GitOps SSH Key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSHKEY }}

      - name: Update Helm Values and Commit
        id: helm
        run: |
          
          # Commit and push the changes
          git config --global user.email "actions@github.com"
          git config --global user.name "SCSS GitHub Actions"
          git clone -b ${{ env.BRANCH_NAME }} --single-branch git@github.com:bcgov-c/tenant-gitops-17b24e.git
          
          # Navigate to the directory containing your Helm values file for the environment develop -> DEV, test -> test
          cd tenant-gitops-17b24e/charts

          # Update the Helm values file with the new image tag and version
          DATETIME=$(date +'%Y-%m-%d %H:%M:%S')  # Get current date and time

          sed -i "s/tag: .*/tag: ${{ env.IMAGE_TAG }} # Image Updated on $DATETIME/" ../deploy/dev_values.yaml
          sed -i "s/version: .*/version: ${{ steps.short_sha.outputs.SHORT_SHA }} # Version Updated on $DATETIME/" ../deploy/dev_values.yaml
          
          git add .
          
          git add ../deploy/dev_values.yaml
          
          # Repackage Helm Chart      

          cd gitops

          helm dependency build
          
          cd charts

          git add .
          
          git commit -m "Update Dev SCSS API image tag"
          git push origin ${{ env.BRANCH_NAME }} # Update the branch name as needed
